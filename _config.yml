# Minimal Mistakes Settings
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "default"

# Site Settings
title: "Nama Kamu"
subtitle: "Cybersecurity Engineering Student | Blue Team Operations"
description: "Fokus pada Defensive Security, Security Awareness, dan Deteksi Ancaman Berbasis Perilaku"
url: "https://expertise-hope.github.io"
repository: "expertise-hope/expertize-hope.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge

# Plugins (untuk GitHub Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Disable yang tidak perlu untuk menghindari error
twitter:
  username: 
social:
  name: 
  links:

# Default Front Matter
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
