# Minimal Mistakes Settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

# Site Settings
title: "Nama Kamu"
subtitle: "Cybersecurity Engineering Student | Blue Team Operations"
description: "Fokus pada Defensive Security, Security Awareness, dan Deteksi Ancaman Berbasis Perilaku"
url: "https://expertise-hope.github.io"
repository: "expertise-hope/expertize-hope.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Author
author:
  name: "Nama Kamu"
  avatar: "/assets/images/profile.jpg"
  bio: "Mahasiswa Teknik Keamanan Siber tahun pertama dengan komitmen pada praktik keamanan defensif dan etis."
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/username"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/expertize-hope"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:email@kamu.com"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
